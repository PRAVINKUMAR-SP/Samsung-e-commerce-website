spring.application.name=backend
server.port=${PORT:8080}

# Database - uses env vars in production, falls back to local dev values
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/samsung}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dppfcdrim}
cloudinary.api-key=${CLOUDINARY_API_KEY:242818752219187}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:oULL3OjD7xQFZ30VeOMld9xXaAk}

# ===== Performance Optimizations =====

# Lazy init beans for faster startup (cuts cold-start time significantly)
spring.main.lazy-initialization=true

# HikariCP connection pool tuning
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# JPA optimizations
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Disable unnecessary auto-configs
spring.jmx.enabled=false

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

